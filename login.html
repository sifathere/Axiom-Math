<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Login - Axiom Math</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<style>
		body {
			font-family: Arial;
			background: #f2f2f2;
			display: flex;
			justify-content: center;
			align-items: center;
			height: 100vh;
		}

		.login-box {
			background: white;
			padding: 30px;
			border-radius: 10px;
			width: 300px;
			box-shadow: 0px 0px 10px gray;
		}

		.login-box h2 {
			text-align: center;
		}

		.login-box input {
			width: 100%;
			padding: 10px;
			margin: 10px 0;
		}

		.login-box button {
			width: 100%;
			padding: 10px;
			background: green;
			color: white;
			border: none;
			cursor: pointer;
		}
	</style>
</head>

<body>

<div class="login-box">
	<h2>Login</h2>

<input type="email" id="email" placeholder="Enter Email">
<input type="password" id="password" placeholder="Enter Password">

	<button onclick="validateLogin()">Login</button>
</div>
<script>
function validateLogin() {
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    alert("Email: " + email + "\nPassword: " + password);
}
</script>
</body>
</html>
